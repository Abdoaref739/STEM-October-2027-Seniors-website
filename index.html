<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Seniors 2027 | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!--hero section-->
    <div class="hero-div">
        <div class="gradient-hero-div">
        <h1 class="main-text">STEM High School for Boys 
            - 6th of October introduces</h1>
        <span id="seniors-main-text">STEM 2027 Seniors Website!</span>
        <div id="container">
            <div id="sticker1" class="sticker">
                <img src="./images/sticker1.png" id="sticker1-img" class="sticker-img">
            </div>
            <div id="sticker2" class="sticker">
                <img src="./images/sticker2.jpg" id="sticker2-img" class="sticker-img">
            </div>
            <div id="sticker3" class="sticker">
                <img src="./images/sticker3.jpg" id="sticker3-img" class="sticker-img">
            </div>
            <div id="sticker4" class="sticker">
                <img src="./images/sticker4.jpg" id="sticker4-img" class="sticker-img">
            </div>
            <div id="sticker5" class="sticker">
                <img src="./images/sticker5.jpg" id="sticker5-img" class="sticker-img">
            </div>
            <button id="start-button">See our message for y'all</button>
        </div>
        </div>
    </div>
    <!--countdown section-->
    <div class="countdown-section">
        <h1 class="countdown-section-header">Countdown to the finale...</h1>
        <div id="countdown-div">
            <div id="days-countdown-div" class="countdown-box">
                <span class="days-countdown-counter" id="countdown-counter"></span>
                <span class="days-countdown-label" id="countdown-label">Days</span>
            </div>
            <div id="hours-countdown-div" class="countdown-box">
                <span class="hours-countdown-counter" id="countdown-counter"></span>
                <span class="hours-countdown-label" id="countdown-label">Hours</span>
            </div>
            <div id="minutes-countdown-div" class="countdown-box">
                <span class="minutes-countdown-counter" id="countdown-counter"></span>
                <span class="minutes-countdown-label" id="countdown-label">Minutes</span>
            </div>
            <div id="seconds-countdown-div" class="countdown-box">
                <span class="seconds-countdown-counter" id="countdown-counter"></span>
                <span class="seconds-countdown-label" id="countdown-label">Seconds</span>
            </div>
        </div>
        <div class="progress-section">
        <span class="progressbar-text">25%</span>
        <div id="progressbar-div">
            <div id="progressbar"></div>
            </div>
            
        <div id="sticker6" class="sticker">
                <img src="./images/sticker6.jpg" id="sticker6-img" class="sticker-img">
            </div>
            <div id="sticker7" class="sticker">
                <img src="./images/sticker7.jpg" id="sticker7-img" class="sticker-img">
            </div>
            <div id="sticker8" class="sticker">
                <img src="./images/sticker8.jpg" id="sticker8-img" class="sticker-img">
            </div>
            <div id="sticker9" class="sticker">
                <img src="./images/sticker9.jpg" id="sticker9-img" class="sticker-img">
            </div>
            <div id="sticker10" class="sticker">
                <img src="./images/sticker10.jpg" id="sticker10-img" class="sticker-img">
            </div>
    </div>
    </div>
    <div class="honorboard-div">
        <div class="gradient-honorboard-div">
            <div class="options-div">
                <i class="fa-solid fa-circle-user" id="options-icon1"></i>
                <i class="fa-solid fa-school" id="options-icon2"></i>
                <i class="fa-solid fa-image" id="options-icon3"></i>
                <i class="fa-solid fa-image" id="options-icon4"></i>
            </div>
        <h1 class="honorboard-header">Seniors on fire!</h1>
        <span class="honorboard-description">look closely on the 2027 talented students</span>
        <button id="honorboard-button" class="honorboard-button">Discover more!</button>
        <button id="honorboard-button" class="honorboard-button2">More about previous seniors</button>
        </div>
    </div>
    <div class="website-developers-div">
        <h1 class="website-developers-header">MEET our <br> website<br> developer</h1>
    <!--<img src="./images/star.png" id="star1">-->
        <div id="developer-card">
            <div class="upper-card-div">
                <div class="upper-card-circle">
                    <img src="./images/developer-image.png" id="developer-image">
                </div>
            </div>
            <div class="middle-card-div">
                <span class="developer-name-span">AbdEl-Rahman Aref</span>
                <span class="developer-field-span">FrontEnd Web Developer</span>
            </div>
            <div class="lower-card-div">
                <button id="developer-github-button">view github profile</button>
            </div>
        </div>
    </div>
